<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>note</title>

<style>

body{
font-family:Arial;
background:#121212;
color:#e0e0e0;
padding:30px;
}

h1{
color:#fff;
}

.code-container{
background:#1e1e1e;
padding:20px;
border-radius:6px;
position:relative;
overflow-x:auto;
border:1px solid #333;
display:none;
}

pre{
margin:0;
white-space:pre;
}

.copy-btn{
position:absolute;
top:10px;
right:10px;
background:#2a2a2a;
color:white;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}

.copy-btn:hover{
background:#3a3a3a;
}

input{
padding:8px;
background:#1e1e1e;
border:1px solid #333;
color:#fff;
border-radius:6px;
}

button{
padding:8px 16px;
margin-left:5px;
cursor:pointer;
background:#2a2a2a;
color:white;
border:none;
border-radius:6px;
}

</style>
</head>

<body>

<h1>Notes</h1>

<input type="password" id="pin" placeholder="Enter Number">
<button onclick="unlock()">Counter Start</button>

<div class="code-container" id="codeBox">
<button class="copy-btn" onclick="copyCode()">Copy</button>
<pre><code id="codeBlock">

// Put your Java code here

public class HelloWorld {
    public static void main(String[] args) {
        System.out.println("Hello World!");
    }
}

</code></pre>
</div>

<script>


const storedHash = "f3d65219b5e717ad393d98b2363afeeb1434bb1e9f9a540d3e4e3c34db3832fc";

async function sha256(message){

const msgBuffer = new TextEncoder().encode(message);
const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
const hashArray = Array.from(new Uint8Array(hashBuffer));

return hashArray.map(b => b.toString(16).padStart(2,"0")).join("");

}

async function unlock(){

let pin=document.getElementById("pin").value;

let hash=await sha256(pin);

if(hash===storedHash){

document.getElementById("codeBox").style.display="block";

}else{

alert("Wrong Number");

}

}

function copyCode(){

let code=document.getElementById("codeBlock").innerText;

navigator.clipboard.writeText(code);

}

/* basic protection */

document.addEventListener("contextmenu",e=>e.preventDefault());

document.onkeydown=function(e){

if(e.keyCode==123)return false;
if(e.ctrlKey && e.shiftKey && e.keyCode==73)return false;

}

</script>

</body>
</html>
