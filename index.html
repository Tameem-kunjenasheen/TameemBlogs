<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Java Code Viewer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 30px;
        }

        h1 {
            color: #333;
        }

        .code-container {
            background: #1e1e1e;
            color: #dcdcdc;
            padding: 20px;
            border-radius: 6px;
            position: relative;
            overflow-x: auto;
        }

        pre {
            margin: 0;
            white-space: pre;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4caf50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: #43a047;
        }

        textarea {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
        }

        .update-btn {
            margin-top: 10px;
            padding: 8px 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Java Code Viewer</h1>

<div class="code-container">
    <button class="copy-btn" onclick="copyCode()">Copy</button>
    <pre><code id="codeBlock"></code></pre>
</div>
<h3>Edit Java Code (optional)</h3>
<textarea id="codeEditor"></textarea>
<br>
<button class="update-btn" onclick="updateCode()">Update Code</button>
<script>
    // 🔹 Put your Java code here (easy to update) 
    let javaCode = `// ---------------- REPORT -------------
    





 

Optimized Automation Flow – Java Application

Step 1 – Upload Input File  
The user uploads the Monthly Cash Balance Excel report into the application.

Step 2 – Data Validation  
The system validates the uploaded file to ensure:
- The file format is correct (Excel).
- Required columns are present.
- No mandatory fields are missing.

Step 3 – Data Filtering  
The system automatically filters the data based on the following conditions:
- ALPRIE = CUT  
- ALCYCD = SAR  
- ALDCG = SABB  

Any rows that do not meet these conditions are removed.

Step 4 – Remove Zero Balances  
The system checks column ALMVC1 and removes rows where the balance is zero.

Step 5 – Balance Conversion  
Column ALMVC1 contains values in halalas.  
The system converts them to SAR using the formula:

Balance = ALMVC1 / 100

Step 6 – Aggregate Balance Calculation  
The application calculates the Total Eligible Average Balance from the remaining records.

Step 7 – Reverse Repo Rate  
The Reverse Repo Rate is applied in the calculation.  
This can be handled in two ways:
- Automatically fetching the rate from the SAMA website.
- Allowing the user to manually enter the rate.

Step 8 – DCC and GC Balance Calculation  
The system calculates the balances for:
- DCC
- GC
- Project Trust
- Internal / Other
- Private Funds

Step 9 – NII Calculation  
The application calculates the estimated NII using the formula:

NII = Balance × Reverse Repo Rate × Days / 360

Step 10 – Generate Final Report  
The system generates the final NII Estimation Report in Excel format.  
The report includes:
- Eligible Average Balance
- Reverse Repo Rate
- Number of days in the month
- DCC and GC balances
- Final NII estimate. 





`;

    // Load code on page load
    document.getElementById("codeBlock").textContent = javaCode;
    document.getElementById("codeEditor").value = javaCode;

    function updateCode() {
        javaCode = document.getElementById("codeEditor").value;
        document.getElementById("codeBlock").textContent = javaCode;
    }

    function copyCode() {
        navigator.clipboard.writeText(javaCode);
        
    }
</script>

</body>
</html>
