NII ESTIMATION – CALCULATION LOGIC EXPLANATION

1. Purpose  
The purpose of the NII Estimation process is to calculate the estimated Net Interest Income (NII) for the month based on the eligible customer balances and the Reverse Repo Rate issued by SAMA.

The calculation is currently performed manually using Excel and involves filtering balance records, converting balances, calculating eligible balances, and applying the interest formula.

----------------------------------------------------

2. Source Data  
The input for the process is the Monthly Cash Balance Report received from Finance.

The report contains customer balances and product information.

Important columns used for calculation:

ALPRIE – Product Type  
ALCYCD – Currency Code  
ALDCG – Bank Code  
ALMVC1 – Balance Amount (stored in Halalas)

Note: ALMVC1 contains balance in Halalas.

100 Halalas = 1 SAR

----------------------------------------------------

3. Data Filtering Rules

Before performing any calculations, the dataset must be filtered using the following conditions:

ALPRIE must equal CUT  
ALCYCD must equal SAR  
ALDCG must equal SABB  
ALMVC1 must be greater than zero

All rows that do not satisfy these conditions must be removed from the dataset.

After filtering, the expected remaining rows are usually around 700–900 records.

----------------------------------------------------

4. Balance Conversion

The column ALMVC1 stores balance values in Halalas.  
These values must be converted into Saudi Riyals (SAR).

Formula:

Balance (SAR) = ALMVC1 / 100

Example:

ALMVC1 = 250000  
Balance (SAR) = 250000 / 100  
Balance = 2500 SAR

----------------------------------------------------

5. Eligible Average Balance Calculation

After filtering and conversion, the system calculates the total eligible balance.

Formula:

Total Eligible Average Balance = Sum of all converted balances

Example:

Balance 1 = 1,500 SAR  
Balance 2 = 2,500 SAR  
Balance 3 = 3,000 SAR

Total Eligible Balance = 1,500 + 2,500 + 3,000

Total Eligible Balance = 7,000 SAR

In real scenarios, the total eligible balance is usually around:

SAR 3 Billion (approximately)

----------------------------------------------------

6. Reverse Repo Rate

The Reverse Repo Rate is obtained from the SAMA (Saudi Central Bank) website.

This rate represents the interest rate applied for the calculation.

Example:

Reverse Repo Rate = 5.50%

The rate must be converted to decimal format before calculation.

5.50% = 0.055

----------------------------------------------------

7. Number of Days in Month

The calculation requires the number of days in the current month.

Examples:

January = 31 days  
February = 28 days  
April = 30 days

This value should either be automatically calculated by the system or entered by the user.

----------------------------------------------------

8. Core NII Calculation Formula

The Net Interest Income (NII) estimation uses the following formula:

NII = Total Balance × Repo Rate × Days / 360

Explanation:

Total Balance – Total eligible average balance  
Repo Rate – Reverse Repo Rate from SAMA  
Days – Number of days in the current month  
360 – Banking industry standard used for interest calculations

----------------------------------------------------

9. Example NII Calculation

Example values:

Total Balance = 3,000,000,000 SAR  
Reverse Repo Rate = 5.50% (0.055)  
Days = 30

Step 1 – Multiply balance with rate

3,000,000,000 × 0.055  
= 165,000,000

Step 2 – Multiply by number of days

165,000,000 × 30  
= 4,950,000,000

Step 3 – Divide by 360

4,950,000,000 / 360  
= 13,750,000

Estimated NII = 13,750,000 SAR

----------------------------------------------------

10. Rounding Rule

The calculated NII value must be rounded to one decimal place before reporting.

Example:

13,750,000 → 13.8 million SAR

----------------------------------------------------

11. DCC and GC Balance Calculation

The estimation process also requires splitting balances into DCC and GC categories.

The balances are derived from the following groups:

Project Trust  
Internal  
Other  
Private Funds

Calculation rule:

DCC Estimate Balance = Total Balance – Private Funds Balance

The remaining balance is considered as GC Balance.

Example:

Total Balance = 3,000,000,000  
Private Funds = 500,000,000

DCC Balance = 3,000,000,000 – 500,000,000  
DCC Balance = 2,500,000,000

GC Balance = Remaining portion of the total balance.

----------------------------------------------------

12. Final Output Values

The final report should include the following calculated values:

Total Eligible Average Balance  
Reverse Repo Rate  
Number of Days in Month  
DCC Balance  
GC Balance  
Estimated NII

----------------------------------------------------

13. Calculation Workflow

The full calculation process follows the sequence below:

Load Monthly Balance Excel File

Filter Records
(ALPRIE = CUT, ALCYCD = SAR, ALDCG = SABB)

Remove Rows with Zero Balance

Convert Halalas to SAR
(ALMVC1 / 100)

Calculate Total Eligible Balance

Obtain Reverse Repo Rate

Determine Number of Days in the Month

Calculate DCC and GC Balances

Calculate NII using the formula:
Balance × Repo Rate × Days / 360

Round the final NII value

Generate Final NII Estimation Report

----------------------------------------------------

Currency must be SAR  
Balance values must not be negative  
Reverse Repo Rate must be provided

DAILY AVERAGE BALANCE CALCULATION

1. Purpose  
Daily Average Balance (DAB) is used to determine the average balance maintained during a specific period.  
Banks use this value to calculate interest income accurately.

Instead of using only the closing balance of the month, the system calculates the average of balances across all days.

----------------------------------------------------

2. Daily Average Balance Formula

Daily Average Balance = Sum of Daily Balances / Number of Days

Where:

Daily Balance = Balance maintained on each day  
Number of Days = Total days in the calculation period

----------------------------------------------------

3. Example Calculation

Example balances during a 5-day period:

Day 1 Balance = 1,000,000 SAR  
Day 2 Balance = 1,200,000 SAR  
Day 3 Balance = 1,100,000 SAR  
Day 4 Balance = 1,300,000 SAR  
Day 5 Balance = 1,400,000 SAR

Step 1 – Sum of daily balances

1,000,000  
+ 1,200,000  
+ 1,100,000  
+ 1,300,000  
+ 1,400,000

Total = 6,000,000 SAR

Step 2 – Divide by number of days

Daily Average Balance = 6,000,000 / 5

Daily Average Balance = 1,200,000 SAR

----------------------------------------------------

4. Monthly Daily Average Balance

If the calculation is done for an entire month:

Monthly Average Balance = Sum of Daily Balances for the Month / Number of Days in Month

Example:

Total Daily Balances for month = 93,000,000,000  
Days in month = 31

Monthly Average Balance = 93,000,000,000 / 31

Monthly Average Balance = 3,000,000,000 SAR

This value becomes the Eligible Average Balance used for NII calculation.

----------------------------------------------------

5. Why Banks Use Daily Average Balance

Banks prefer Daily Average Balance instead of month-end balance because:

It reflects the actual funds available during the entire period.  
It prevents manipulation by depositing funds only on the last day of the month.  
It provides accurate interest income estimation.

PREVIOUS MONTH FORMULA TABLE LOGIC

1. Purpose  
The previous month formula table is used as a template to maintain the calculation structure.  
Instead of rebuilding formulas every month, the existing sheet is copied and updated with new data.

----------------------------------------------------

2. Structure of the Formula Table

The table normally contains the following sections:

Eligible Average Balance  
DCC Balance  
GC Balance  
Project Trust Balance  
Internal Balance  
Other Balance  
Private Funds Balance  
Reverse Repo Rate  
Number of Days  
Estimated NII

Each row contains formulas that calculate totals and interest.

----------------------------------------------------

3. Why Previous Month File Is Used

Using the previous month file ensures:

The formulas remain consistent.  
The structure of calculations is preserved.  
The risk of formula errors is reduced.

Only the values need to be updated.

----------------------------------------------------

4. Monthly Update Process

Each month the following fields are updated:

Eligible Average Balance  
Private Funds Balance  
Reverse Repo Rate  
Number of Days in the Month

All other calculations automatically update using formulas already present in the sheet.

----------------------------------------------------

Eligible Average Balance = 3,000,000,000 SAR  
Reverse Repo Rate = 5.50%  
Days = 30

Excel formula used:

NII = Balance × Repo Rate × Days / 360

Example Excel formula:

= B2 * B3 * B4 / 360

Where:

B2 = Eligible Balance  
B3 = Repo Rate  
B4 = Number of Days

----------------------------------------------------

6. Output Produced by the Table

The formula table produces the following outputs automatically:

Estimated NII  
DCC Estimated Balance  
GC Estimated Balance  
Total Eligible Balance

These values are used for reporting and accounting entries.
