<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Java Code Viewer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 30px;
        }

        h1 {
            color: #333;
        }

        .code-container {
            background: #1e1e1e;
            color: #dcdcdc;
            padding: 20px;
            border-radius: 6px;
            position: relative;
            overflow-x: auto;
        }

        pre {
            margin: 0;
            white-space: pre;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4caf50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: #43a047;
        }

        textarea {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
        }

        .update-btn {
            margin-top: 10px;
            padding: 8px 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Java Code Viewer</h1>

<div class="code-container">
    <button class="copy-btn" onclick="copyCode()">Copy</button>
    <pre><code id="codeBlock"></code></pre>
</div>
<h3>Edit Java Code (optional)</h3>
<textarea id="codeEditor"></textarea>
<br>
<button class="update-btn" onclick="updateCode()">Update Code</button>
<script>
    // 🔹 Put your Java code here (easy to update) 
    let javaCode = `// ---------------- REPORT -------------
    

⸻

Title

Production IP Address Update for FCCRAM Online Application – Nginx Plus Migration

⸻

Short Description

Update of Production IP addresses for FCCRAM Online Application as part of Nginx Plus migration. No URL changes involved.

⸻

Description

As part of the Nginx Plus migration, the FCCRAM Online Application infrastructure is being updated in Production. There is no change in URL. Only the backend IP addresses are being updated.

The new Production IP addresses will be added while keeping the existing IP addresses active. Once validation is completed successfully, the old IP addresses will be removed.

⸻

Justification

This change is required to complete the Production phase of the Nginx Plus migration. The migration improves infrastructure stability and standardization.

If this change is not implemented, the Production environment will remain on the old configuration and the migration activity will remain incomplete.

⸻

Implementation Plan
	1.	Infrastructure Team will confirm the new Production IP addresses.
	2.	Network/Application Team will update the IP configuration by adding new IPs while keeping old IPs active.
	3.	Validate application connectivity using both IP addresses.
	4.	Application Team will perform functional testing.
	5.	After successful validation, Network Team will remove old IP addresses.
	6.	Final connectivity and application validation will be completed.

⸻

Business Impact

If the change is not completed:
	•	Production migration will remain incomplete.
	•	Future infrastructure support and maintenance may be impacted.
	•	Risk of service interruption if old infrastructure is decommissioned without update.

During implementation:
	•	No user impact expected.
	•	No URL change for users.

⸻

Technical Impact
	•	Backend IP configuration update in Production.
	•	No application code change.
	•	No database impact.
	•	Risk scenario: Incorrect IP configuration can cause application connectivity failure.

Proper validation will be performed to avoid service disruption.

⸻

Backout Plan
	1.	If connectivity issues are observed, remove newly added IP addresses.
	2.	Retain and revert fully to existing old IP configuration.
	3.	Validate application connectivity on old IPs.
	4.	Inform stakeholders once service is stable.

⸻

Post-Implementation Verification Plan
	1.	Verify application accessibility via Production URL.
	2.	Validate backend connectivity to new IP addresses.
	3.	Confirm no errors in application logs.
	4.	Obtain business confirmation after validation Regards,  
Akram





`;

    // Load code on page load
    document.getElementById("codeBlock").textContent = javaCode;
    document.getElementById("codeEditor").value = javaCode;

    function updateCode() {
        javaCode = document.getElementById("codeEditor").value;
        document.getElementById("codeBlock").textContent = javaCode;
    }

    function copyCode() {
        navigator.clipboard.writeText(javaCode);
        
    }
</script>

</body>
</html>
