<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Note</title>

<style>

body{
font-family:Arial;
background:#121212;
color:#e0e0e0;
padding:30px;
}

h1{
color:#ffffff;
}

.code-container{
background:#1e1e1e;
padding:20px;
border-radius:8px;
position:relative;
overflow-x:auto;
border:1px solid #333;
display:none;
}

pre{
margin:0;
white-space:pre;
color:#e0e0e0;
}

.copy-btn{
position:absolute;
top:10px;
right:10px;
background:#2a2a2a;
color:#fff;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.copy-btn:hover{
background:#3a3a3a;
}

input{
padding:8px;
margin-top:10px;
background:#1e1e1e;
border:1px solid #333;
color:#fff;
border-radius:6px;
}

button{
padding:8px 16px;
margin-left:6px;
cursor:pointer;
background:#2a2a2a;
color:#fff;
border:none;
border-radius:6px;
}

#msg{
margin-top:10px;
color:#aaa;
}

</style>
</head>

<body>

<h1>Keep a small note</h1>

<p>Enter Number for counter to start.</p>

<input type="password" id="pin" placeholder="Enter Access Pin">
<button onclick="unlock()">get</button>

<div id="msg"></div>

<div class="code-container" id="codeBox">
<button class="copy-btn" onclick="copyCode()">Copy</button>
<pre><code id="codeBlock"></code></pre>
</div>

<script>

/* CONSTANT PIN */
const correctPin = "zoha123notes";

/* 🔐 Encrypted Java Code (Base64) */
const encryptedCode = "Ci8vIFBsYWNlIHlvdXIgSmF2YSBjb2RlIGhlcmUKcHVibGljIGNsYXNzIEhlbGxvIHsKICAgIHB1YmxpYyBzdGF0aWMgdm9pZCBtYWluKFN0cmluZ1tdIGFyZ3MpIHsKICAgICAgICBTeXN0ZW0ub3V0LnByaW50bG4oIkhlbGxvIFdvcmxkISIpOwogICAgfQp9";

/* decode base64 */
function decryptCode(data){
return atob(data);
}

function unlock(){

let pin=document.getElementById("pin").value;

if(pin!==correctPin){
document.getElementById("msg").innerText="wrong number.";
return;
}

let code=decryptCode(encryptedCode);

document.getElementById("codeBlock").textContent=code;
document.getElementById("codeBox").style.display="block";
document.getElementById("msg").innerText="";

}

function copyCode(){

let code=document.getElementById("codeBlock").textContent;

navigator.clipboard.writeText(code);

}

/* basic protection */

document.addEventListener("contextmenu",e=>e.preventDefault());

document.onkeydown=function(e){

if(e.keyCode==123)return false;
if(e.ctrlKey && e.shiftKey && e.keyCode==73)return false;

}

</script>

</body>
</html>
